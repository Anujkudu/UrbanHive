<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Urban Hive</title>
    <link rel="stylesheet" href="../../styles/main.css">
    <link rel="icon" href="../../assets/images/UrbanHive-Logo.png">
    <style>
        .profile-hero {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            margin-bottom: 1.5rem;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .profile-hero::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15), transparent 70%);
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            color: white;
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
            margin-bottom: 1rem;
        }

        .profile-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .profile-role {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .profile-badges {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.75rem;
        }

        .profile-badge {
            padding: 0.375rem 0.875rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .quick-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .quick-stat {
            text-align: center;
            padding: 1.25rem 0.75rem;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .quick-stat-value {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 0.25rem;
        }

        .quick-stat-label {
            font-size: 0.6875rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1rem;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .info-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.125rem;
            flex-shrink: 0;
        }

        .info-label {
            font-size: 0.6875rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-value {
            font-weight: 600;
            font-size: 0.9375rem;
            margin-top: 0.125rem;
        }

        .shift-card {
            padding: 1.25rem;
            border-radius: 14px;
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }

        .shift-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }
    </style>
<script type="module" src="../../scripts/core/auth-guard.js"></script>
</head>

<body>
    <div class="dashboard">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <img src="../../assets/images/UrbanHive-Logo.png" alt="Urban Hive" class="sidebar-logo-icon"
                        style="width: 50px; height: 50px; object-fit: contain;">
                    <span class="sidebar-logo-text">Urban Hive</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <p class="nav-section-title">Work</p>
                    <a href="dashboard.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7" rx="1"></rect>
                            <rect x="14" y="3" width="7" height="7" rx="1"></rect>
                            <rect x="14" y="14" width="7" height="7" rx="1"></rect>
                            <rect x="3" y="14" width="7" height="7" rx="1"></rect>
                        </svg><span>Dashboard</span></a>
                    <a href="tasks.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M9 11l3 3L22 4"></path>
                            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                        </svg><span>Tasks</span></a>
                    <a href="attendance.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg><span>Attendance</span></a>
                </div>
                <div class="nav-section">
                    <p class="nav-section-title">Info</p>
                    <a href="notifications.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                        </svg><span>Notifications</span></a>
                    <a href="salary.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="1" x2="12" y2="23"></line>
                            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                        </svg><span>Salary</span></a>
                </div>
                <div class="nav-section">
                    <p class="nav-section-title">Account</p>
                    <a href="profile.html" class="nav-link active"><svg width="20" height="20" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg><span>My Profile</span></a>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar">W</div>
                    <div class="user-info">
                        <div class="user-name" id="userName">Worker</div>
                        <div class="user-role">Worker</div>
                    </div>
                    <button class="logout-btn" onclick="logout()"><svg width="20" height="20" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg></button>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="topbar">
                <button class="menu-toggle" onclick="toggleSidebar()"><svg width="24" height="24" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg></button>
                <div class="topbar-actions"><button class="topbar-btn"><svg width="20" height="20" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                        </svg></button></div>
            </div>

            <div class="content-area">
                <!-- Profile Hero -->
                <div class="profile-hero" id="profileHero"></div>

                <!-- Quick Stats -->
                <div class="quick-stats" id="quickStats"></div>

                <!-- Personal Info -->
                <div class="card" style="margin-bottom: 1.5rem;">
                    <div class="card-header">
                        <h3 class="card-title">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            Personal Information
                        </h3>
                    </div>
                    <div class="card-body">
                        <div class="info-grid" id="infoGrid"></div>
                    </div>
                </div>

                <!-- Shift Schedule -->
                <div class="card" style="margin-bottom: 1.5rem;">
                    <div class="card-header">
                        <h3 class="card-title">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <polyline points="12 6 12 12 16 14"></polyline>
                            </svg>
                            Shift Schedule
                        </h3>
                    </div>
                    <div class="card-body" id="shiftInfo"></div>
                </div>

                <!-- Emergency Contacts -->
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path
                                    d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72">
                                </path>
                            </svg>
                            Emergency Contacts
                        </h3>
                    </div>
                    <div class="card-body" id="emergencyContacts"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="toastContainer"></div>

    <script src="../../scripts/core/data.js"></script>
    <script src="../../scripts/core/dashboard.js"></script>
    <script>
        const user = requireAuth();
        if (!user || user.role !== 'worker') window.location.href = '../login.html';
        if (user) document.getElementById('userName').textContent = user.name;

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

        const worker = data.workers.find(w => w.id === user.id) || data.workers[0];
        const myTasks = data.tasks.filter(t => t.assignedTo === worker.id);
        const salaries = data.workerSalary || [];

        // Profile Hero
        document.getElementById('profileHero').innerHTML = `
            <div class="profile-avatar">${worker.name.charAt(0)}</div>
            <div class="profile-name">${worker.name}</div>
            <div class="profile-role">${worker.type} • ${worker.shift} Shift</div>
            <div class="profile-badges">
                <span class="profile-badge">${createBadge(worker.status)}</span>
                <span class="profile-badge">🪪 ${worker.id}</span>
                <span class="profile-badge">📅 Since ${formatDate(worker.joiningDate)}</span>
            </div>
        `;

        // Quick Stats
        document.getElementById('quickStats').innerHTML = `
            <div class="quick-stat animate-slide-in-up stagger-1">
                <div class="quick-stat-value" style="color: var(--accent-primary);">${myTasks.filter(t => t.status === 'Completed').length}</div>
                <div class="quick-stat-label">Completed</div>
            </div>
            <div class="quick-stat animate-slide-in-up stagger-2">
                <div class="quick-stat-value" style="color: var(--warning);">${myTasks.filter(t => t.status === 'Pending' || t.status === 'In Progress').length}</div>
                <div class="quick-stat-label">Active Tasks</div>
            </div>
            <div class="quick-stat animate-slide-in-up stagger-3">
                <div class="quick-stat-value" style="color: var(--success);">${data.workerStats.attendanceThisMonth}</div>
                <div class="quick-stat-label">Days Present</div>
            </div>
            <div class="quick-stat animate-slide-in-up stagger-4">
                <div class="quick-stat-value" style="color: #8b5cf6;">${salaries.length}</div>
                <div class="quick-stat-label">Pay Slips</div>
            </div>
        `;

        // Personal Info
        document.getElementById('infoGrid').innerHTML = `
            <div class="info-item">
                <div class="info-icon" style="background: rgba(59, 130, 246, 0.15);">👤</div>
                <div><div class="info-label">Full Name</div><div class="info-value">${worker.name}</div></div>
            </div>
            <div class="info-item">
                <div class="info-icon" style="background: rgba(139, 92, 246, 0.15);">🔧</div>
                <div><div class="info-label">Department</div><div class="info-value">${worker.type}</div></div>
            </div>
            <div class="info-item">
                <div class="info-icon" style="background: rgba(16, 185, 129, 0.15);">📞</div>
                <div><div class="info-label">Phone</div><div class="info-value">${worker.phone}</div></div>
            </div>
            <div class="info-item">
                <div class="info-icon" style="background: rgba(245, 158, 11, 0.15);">🪪</div>
                <div><div class="info-label">Worker ID</div><div class="info-value">${worker.id}</div></div>
            </div>
            <div class="info-item">
                <div class="info-icon" style="background: rgba(239, 68, 68, 0.15);">📅</div>
                <div><div class="info-label">Joining Date</div><div class="info-value">${formatDate(worker.joiningDate)}</div></div>
            </div>
            <div class="info-item">
                <div class="info-icon" style="background: rgba(6, 182, 212, 0.15);">📊</div>
                <div><div class="info-label">Status</div><div class="info-value">${worker.status}</div></div>
            </div>
        `;

        // Shift Info
        const shifts = {
            'Morning': { time: '6:00 AM - 2:00 PM', icon: '🌅', color: 'rgba(245, 158, 11, 0.1)', border: 'rgba(245, 158, 11, 0.15)' },
            'Evening': { time: '2:00 PM - 10:00 PM', icon: '🌇', color: 'rgba(239, 68, 68, 0.1)', border: 'rgba(239, 68, 68, 0.15)' },
            'Night': { time: '10:00 PM - 6:00 AM', icon: '🌙', color: 'rgba(99, 102, 241, 0.1)', border: 'rgba(99, 102, 241, 0.15)' }
        };
        const sh = shifts[worker.shift] || shifts['Morning'];
        document.getElementById('shiftInfo').innerHTML = `
            <div class="shift-card" style="background: ${sh.color}; border: 1px solid ${sh.border};">
                <div class="shift-icon" style="background: ${sh.color};">${sh.icon}</div>
                <div>
                    <p style="font-weight: 700; font-size: 1.0625rem;">${worker.shift} Shift</p>
                    <p class="text-muted">${sh.time}</p>
                </div>
            </div>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 0.75rem; margin-top: 1rem;">
                <div style="padding: 0.875rem; border-radius: 10px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);">
                    <p class="text-muted text-sm">Working Days</p>
                    <p style="font-weight: 600; margin-top: 0.25rem;">Monday - Saturday</p>
                </div>
                <div style="padding: 0.875rem; border-radius: 10px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);">
                    <p class="text-muted text-sm">Weekly Off</p>
                    <p style="font-weight: 600; margin-top: 0.25rem;">Sunday</p>
                </div>
            </div>
        `;

        // Emergency Contacts
        const settings = data.societySettings;
        document.getElementById('emergencyContacts').innerHTML = `
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 0.75rem;">
                <div class="info-item">
                    <div class="info-icon" style="background: rgba(239, 68, 68, 0.15);">🏥</div>
                    <div><div class="info-label">Emergency</div><div class="info-value">${settings.emergencyContact}</div></div>
                </div>
                <div class="info-item">
                    <div class="info-icon" style="background: rgba(59, 130, 246, 0.15);">🏢</div>
                    <div><div class="info-label">Society Office</div><div class="info-value">${settings.officePhone}</div></div>
                </div>
                <div class="info-item">
                    <div class="info-icon" style="background: rgba(16, 185, 129, 0.15);">📧</div>
                    <div><div class="info-label">Society Email</div><div class="info-value">${settings.email}</div></div>
                </div>
            </div>
        `;
    </script>
</body>

</html>
