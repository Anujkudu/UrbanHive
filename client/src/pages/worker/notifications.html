<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Urban Hive</title>
    <link rel="stylesheet" href="../../styles/main.css">
    <link rel="icon" href="../../assets/images/UrbanHive-Logo.png">
    <style>
        .notif-card {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding: 1.125rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.2s;
            cursor: pointer;
        }

        .notif-card:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .notif-card.unread {
            background: rgba(59, 130, 246, 0.06);
            border-color: rgba(59, 130, 246, 0.15);
        }

        .notif-card.unread::before {
            content: '';
            position: absolute;
            left: -1px;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 60%;
            background: var(--accent-primary);
            border-radius: 4px;
        }

        .notif-card {
            position: relative;
        }

        .notif-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .notif-icon.task {
            background: rgba(59, 130, 246, 0.15);
        }

        .notif-icon.schedule {
            background: rgba(139, 92, 246, 0.15);
        }

        .notif-icon.payment {
            background: rgba(16, 185, 129, 0.15);
        }

        .notif-icon.alert {
            background: rgba(239, 68, 68, 0.15);
        }

        .notif-body {
            flex: 1;
            min-width: 0;
        }

        .notif-title {
            font-weight: 600;
            font-size: 0.9375rem;
            margin-bottom: 0.25rem;
        }

        .notif-msg {
            font-size: 0.8125rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 0.375rem;
        }

        .notif-time {
            font-size: 0.6875rem;
            color: var(--text-secondary);
        }

        .unread-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-primary);
            flex-shrink: 0;
            margin-top: 6px;
        }
    </style>
<script type="module" src="../../scripts/core/auth-guard.js"></script>
</head>

<body>
    <div class="dashboard">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <img src="../../assets/images/UrbanHive-Logo.png" alt="Urban Hive" class="sidebar-logo-icon"
                        style="width: 50px; height: 50px; object-fit: contain;">
                    <span class="sidebar-logo-text">Urban Hive</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <p class="nav-section-title">Work</p>
                    <a href="dashboard.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7" rx="1"></rect>
                            <rect x="14" y="3" width="7" height="7" rx="1"></rect>
                            <rect x="14" y="14" width="7" height="7" rx="1"></rect>
                            <rect x="3" y="14" width="7" height="7" rx="1"></rect>
                        </svg><span>Dashboard</span></a>
                    <a href="tasks.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M9 11l3 3L22 4"></path>
                            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                        </svg><span>Tasks</span></a>
                    <a href="attendance.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg><span>Attendance</span></a>
                </div>
                <div class="nav-section">
                    <p class="nav-section-title">Info</p>
                    <a href="notifications.html" class="nav-link active"><svg width="20" height="20" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                        </svg><span>Notifications</span></a>
                    <a href="salary.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="1" x2="12" y2="23"></line>
                            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                        </svg><span>Salary</span></a>
                </div>
                <div class="nav-section">
                    <p class="nav-section-title">Account</p>
                    <a href="profile.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg><span>My Profile</span></a>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar">W</div>
                    <div class="user-info">
                        <div class="user-name" id="userName">Worker</div>
                        <div class="user-role">Worker</div>
                    </div>
                    <button class="logout-btn" onclick="logout()"><svg width="20" height="20" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg></button>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="topbar">
                <button class="menu-toggle" onclick="toggleSidebar()"><svg width="24" height="24" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg></button>
                <div class="topbar-actions"><button class="topbar-btn"><svg width="20" height="20" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                        </svg></button></div>
            </div>

            <div class="content-area">
                <div class="page-header flex items-center justify-between flex-wrap gap-4">
                    <div>
                        <h1 class="page-title">?? Notifications</h1>
                        <p class="page-subtitle">Stay updated with alerts and updates</p>
                    </div>
                    <button class="btn btn-outline" onclick="markAllRead()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                            <polyline points="22 4 12 14.01 9 11.01"></polyline>
                        </svg>
                        Mark All Read
                    </button>
                </div>

                <!-- Stats -->
                <div class="stats-grid">
                    <div class="stat-card card-3d">
                        <div class="stat-card-header"><span class="stat-card-title">Total</span>
                            <div class="stat-card-icon primary"><svg width="22" height="22" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                                </svg></div>
                        </div>
                        <div class="stat-card-value" id="totalNotifs">0</div>
                    </div>
                    <div class="stat-card card-3d">
                        <div class="stat-card-header"><span class="stat-card-title">Unread</span>
                            <div class="stat-card-icon warning"><svg width="22" height="22" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="8" x2="12" y2="12"></line>
                                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                                </svg></div>
                        </div>
                        <div class="stat-card-value" id="unreadNotifs">0</div>
                    </div>
                    <div class="stat-card card-3d">
                        <div class="stat-card-header"><span class="stat-card-title">Today</span>
                            <div class="stat-card-icon success"><svg width="22" height="22" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                    <line x1="16" y1="2" x2="16" y2="6"></line>
                                    <line x1="8" y1="2" x2="8" y2="6"></line>
                                </svg></div>
                        </div>
                        <div class="stat-card-value" id="todayNotifs">0</div>
                    </div>
                    <div class="stat-card card-3d">
                        <div class="stat-card-header"><span class="stat-card-title">Urgent</span>
                            <div class="stat-card-icon destructive"><svg width="22" height="22" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2">
                                    <path
                                        d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z">
                                    </path>
                                    <line x1="12" y1="9" x2="12" y2="13"></line>
                                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                                </svg></div>
                        </div>
                        <div class="stat-card-value" id="urgentNotifs">0</div>
                    </div>
                </div>

                <!-- Filters -->
                <div class="card" style="margin-bottom: 1.5rem;">
                    <div class="card-body" style="padding: 0.75rem 1rem;">
                        <div class="flex items-center gap-3" style="flex-wrap: wrap;">
                            <button class="btn btn-primary" style="font-size: 0.8125rem; padding: 0.375rem 0.875rem;"
                                onclick="filterNotifs('all')" id="filterAll">All</button>
                            <button class="btn btn-ghost" style="font-size: 0.8125rem; padding: 0.375rem 0.875rem;"
                                onclick="filterNotifs('Task')" id="filterTask">?? Tasks</button>
                            <button class="btn btn-ghost" style="font-size: 0.8125rem; padding: 0.375rem 0.875rem;"
                                onclick="filterNotifs('Schedule')" id="filterSchedule">?? Schedule</button>
                            <button class="btn btn-ghost" style="font-size: 0.8125rem; padding: 0.375rem 0.875rem;"
                                onclick="filterNotifs('Payment')" id="filterPayment">?? Payment</button>
                            <button class="btn btn-ghost" style="font-size: 0.8125rem; padding: 0.375rem 0.875rem;"
                                onclick="filterNotifs('Alert')" id="filterAlert">?? Alerts</button>
                        </div>
                    </div>
                </div>

                <!-- Notifications List -->
                <div id="notifsList" style="display: flex; flex-direction: column; gap: 0.75rem;"></div>
            </div>
        </main>
    </div>

    <div id="toastContainer"></div>

    <script src="../../scripts/core/data.js"></script>
    <script src="../../scripts/core/dashboard.js"></script>
    <script>
        const user = requireAuth();
        if (!user || user.role !== 'worker') window.location.href = '../login.html';
        if (user) document.getElementById('userName').textContent = user.name;

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

        const typeIcons = { 'Task': '??', 'Schedule': '??', 'Payment': '??', 'Alert': '??' };
        let activeFilter = 'all';

        function updateStats() {
            const notifs = data.workerNotifications || [];
            document.getElementById('totalNotifs').textContent = notifs.length;
            document.getElementById('unreadNotifs').textContent = notifs.filter(n => !n.read).length;
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('todayNotifs').textContent = notifs.filter(n => n.date === today).length;
            document.getElementById('urgentNotifs').textContent = notifs.filter(n => n.type === 'Alert').length;
        }

        function renderNotifs(filter) {
            const container = document.getElementById('notifsList');
            let notifs = (data.workerNotifications || []).sort((a, b) => new Date(b.date) - new Date(a.date));
            if (filter && filter !== 'all') notifs = notifs.filter(n => n.type === filter);

            if (notifs.length === 0) {
                container.innerHTML = '<div class="card"><div class="card-body" style="text-align: center; padding: 3rem;"><div style="font-size: 3rem; margin-bottom: 1rem;">??</div><h3 style="font-weight: 600;">No notifications</h3><p class="text-muted">You\'re all caught up!</p></div></div>';
                return;
            }

            container.innerHTML = notifs.map((n, i) => `
                <div class="notif-card ${n.read ? '' : 'unread'} animate-slide-in-up stagger-${(i % 5) + 1}" onclick="toggleRead('${n.id}')">
                    <div class="notif-icon ${n.type.toLowerCase()}">${typeIcons[n.type] || '??'}</div>
                    <div class="notif-body">
                        <div class="notif-title">${n.title}</div>
                        <div class="notif-msg">${n.message}</div>
                        <div class="notif-time">${formatDate(n.date)} • ${n.time}</div>
                    </div>
                    ${n.read ? '' : '<div class="unread-dot"></div>'}
                </div>
            `).join('');
        }

        function filterNotifs(type) {
            activeFilter = type;
            document.querySelectorAll('[id^="filter"]').forEach(b => {
                b.className = type === 'all' && b.id === 'filterAll' || b.id === 'filter' + type ? 'btn btn-primary' : 'btn btn-ghost';
                b.style.fontSize = '0.8125rem';
                b.style.padding = '0.375rem 0.875rem';
            });
            renderNotifs(type);
        }

        function toggleRead(id) {
            const n = data.workerNotifications.find(n => n.id === id);
            if (n) { n.read = !n.read; updateStats(); renderNotifs(activeFilter); }
        }

        function markAllRead() {
            data.workerNotifications.forEach(n => n.read = true);
            updateStats();
            renderNotifs(activeFilter);
            showToast('All notifications marked as read ?', 'success');
        }

        updateStats();
        renderNotifs('all');
    </script>
</body>

</html>
