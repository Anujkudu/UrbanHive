<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tasks - Urban Hive</title>
    <link rel="stylesheet" href="../../styles/main.css">
    <link rel="icon" href="../../assets/images/UrbanHive-Logo.png">
<script type="module" src="../../scripts/core/auth-guard.js"></script>
</head>

<body>
    <div class="dashboard">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <img src="../../assets/images/UrbanHive-Logo.png" alt="Urban Hive" class="sidebar-logo-icon"
                        style="width: 50px; height: 50px; object-fit: contain;">
                    <span class="sidebar-logo-text">Urban Hive</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <p class="nav-section-title">Work</p>
                    <a href="dashboard.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7" rx="1"></rect>
                            <rect x="14" y="3" width="7" height="7" rx="1"></rect>
                            <rect x="14" y="14" width="7" height="7" rx="1"></rect>
                            <rect x="3" y="14" width="7" height="7" rx="1"></rect>
                        </svg><span>Dashboard</span></a>
                    <a href="tasks.html" class="nav-link active"><svg width="20" height="20" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 11l3 3L22 4"></path>
                            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                        </svg><span>Tasks</span></a>
                    <a href="attendance.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg><span>Attendance</span></a>
                </div>
                <div class="nav-section">
                    <p class="nav-section-title">Info</p>
                    <a href="notifications.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                        </svg><span>Notifications</span></a>
                    <a href="salary.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="1" x2="12" y2="23"></line>
                            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                        </svg><span>Salary</span></a>
                </div>
                <div class="nav-section">
                    <p class="nav-section-title">Account</p>
                    <a href="profile.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg><span>My Profile</span></a>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar">W</div>
                    <div class="user-info">
                        <div class="user-name" id="userName">Worker</div>
                        <div class="user-role">Worker</div>
                    </div>
                    <button class="logout-btn" title="Logout" onclick="logout()"><svg width="20" height="20"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg></button>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="topbar">
                <button class="menu-toggle" onclick="toggleSidebar()"><svg width="24" height="24" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg></button>
                <div class="topbar-actions"><button class="topbar-btn"><svg width="20" height="20" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                        </svg></button></div>
            </div>
            <div class="content-area">
                <div class="flex items-center justify-between mb-6">
                    <div>
                        <h1 style="font-size: 1.875rem; font-weight: 700; margin-bottom: 0.25rem;">My Tasks</h1>
                        <p class="text-muted">Manage and track your assigned tasks</p>
                    </div>
                </div>
                <div class="stats-grid" style="margin-bottom: 1.5rem;">
                    <div class="stat-card">
                        <div class="stat-card-header"><span class="stat-card-title">Total Tasks</span>
                            <div class="stat-card-icon primary"><svg width="20" height="20" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M9 11l3 3L22 4"></path>
                                    <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                                </svg></div>
                        </div>
                        <div class="stat-card-value" id="totalTasks">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-header"><span class="stat-card-title">Pending</span>
                            <div class="stat-card-icon warning"><svg width="20" height="20" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <polyline points="12 6 12 12 16 14"></polyline>
                                </svg></div>
                        </div>
                        <div class="stat-card-value" id="pendingTasks">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-header"><span class="stat-card-title">In Progress</span>
                            <div class="stat-card-icon info"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2">
                                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                                </svg></div>
                        </div>
                        <div class="stat-card-value" id="progressTasks">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-header"><span class="stat-card-title">Completed</span>
                            <div class="stat-card-icon success"><svg width="20" height="20" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                                </svg></div>
                        </div>
                        <div class="stat-card-value" id="completedTasks">0</div>
                    </div>
                </div>
                <div class="card" style="margin-bottom: 1.5rem;">
                    <div class="card-body" style="padding: 1rem;">
                        <div class="flex items-center gap-4" style="flex-wrap: wrap;">
                            <div class="form-group" style="margin: 0; flex: 1; min-width: 150px;"><select
                                    id="statusFilter" onchange="filterTasks()">
                                    <option value="">All Status</option>
                                    <option value="Pending">Pending</option>
                                    <option value="In Progress">In Progress</option>
                                    <option value="Completed">Completed</option>
                                </select></div>
                            <div class="form-group" style="margin: 0; flex: 1; min-width: 150px;"><select
                                    id="priorityFilter" onchange="filterTasks()">
                                    <option value="">All Priorities</option>
                                    <option value="High">High</option>
                                    <option value="Medium">Medium</option>
                                    <option value="Low">Low</option>
                                </select></div>
                        </div>
                    </div>
                </div>
                <div class="grid" id="tasksList" style="grid-template-columns: 1fr;"></div>
            </div>
        </main>
    </div>
    <div id="taskDetailModal" class="modal-overlay" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Task Details</h3>
            </div>
            <div class="modal-body" id="taskDetailBody"></div>
            <div class="modal-footer"><button class="btn btn-outline"
                    onclick="hideModal('taskDetailModal')">Close</button><button class="btn btn-primary"
                    id="taskActionBtn" onclick="updateTaskStatus()">Update Status</button></div>
        </div>
    </div>
    <script src="../../scripts/core/data.js"></script>
    <script src="../../scripts/core/dashboard.js"></script>
    <script>
        const user = requireAuth();
        if (!user || user.role !== 'worker') window.location.href = 'login.html';
        let myTasks = data.tasks.filter(t => t.assignedTo === user.id || t.assignedTo === 'W003' || t.assignedTo === 'W001');
        let currentTaskId = null;

        function updateStats() {
            document.getElementById('totalTasks').textContent = myTasks.length;
            document.getElementById('pendingTasks').textContent = myTasks.filter(t => t.status === 'Pending').length;
            document.getElementById('progressTasks').textContent = myTasks.filter(t => t.status === 'In Progress').length;
            document.getElementById('completedTasks').textContent = myTasks.filter(t => t.status === 'Completed').length;
        }

        function getPriorityColor(priority) {
            const colors = { 'High': 'var(--destructive)', 'Medium': 'var(--warning)', 'Low': 'var(--info)' };
            return colors[priority] || 'var(--muted-foreground)';
        }

        function renderTasks(tasks) {
            const container = document.getElementById('tasksList');
            if (tasks.length === 0) { container.innerHTML = '<div class="card"><div class="card-body" style="text-align: center; padding: 3rem;"><h3 style="font-weight: 600; margin-bottom: 0.5rem;">No tasks found</h3><p class="text-muted">No tasks match your criteria.</p></div></div>'; return; }
            container.innerHTML = tasks.map(t => `<div class="card" style="margin-bottom: 1rem; ${t.status === 'Completed' ? 'opacity: 0.7;' : ''} border-left: 4px solid ${getPriorityColor(t.priority)};"><div class="card-body"><div class="flex items-start justify-between mb-3"><div class="flex items-start gap-3"><input type="checkbox" ${t.status === 'Completed' ? 'checked' : ''} onchange="toggleTask('${t.id}')" style="margin-top: 0.25rem; width: 1.25rem; height: 1.25rem; cursor: pointer;"><div><h3 style="font-weight: 600; font-size: 1rem; ${t.status === 'Completed' ? 'text-decoration: line-through; color: var(--muted-foreground);' : ''}">${t.title}</h3><p class="text-muted text-sm">${t.id} ? Due: ${formatDate(t.dueDate)}</p></div></div><div class="flex items-center gap-2">${createBadge(t.priority)}${createBadge(t.status)}</div></div><p style="color: var(--muted-foreground); margin-bottom: 1rem; padding-left: 2rem;">${t.description}</p><div class="flex items-center justify-between" style="padding-top: 1rem; border-top: 1px solid var(--border);"><div class="text-sm text-muted">Assigned by: Manager</div><div class="flex gap-2">${t.status === 'Pending' ? `<button class="btn btn-outline" style="padding: 0.375rem 0.75rem; font-size: 0.75rem;" onclick="startTask('${t.id}')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>Start</button>` : t.status === 'In Progress' ? `<button class="btn btn-primary" style="padding: 0.375rem 0.75rem; font-size: 0.75rem;" onclick="completeTask('${t.id}')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>Complete</button>` : ''}<button class="btn btn-outline" style="padding: 0.375rem 0.75rem; font-size: 0.75rem;" onclick="viewTask('${t.id}')">Details</button></div></div></div></div>`).join('');
        }

        function filterTasks() {
            const status = document.getElementById('statusFilter').value;
            const priority = document.getElementById('priorityFilter').value;
            let filtered = myTasks;
            if (status) filtered = filtered.filter(t => t.status === status);
            if (priority) filtered = filtered.filter(t => t.priority === priority);
            renderTasks(filtered);
        }

        function toggleTask(id) {
            const task = myTasks.find(t => t.id === id);
            if (task) { task.status = task.status === 'Completed' ? 'In Progress' : 'Completed'; filterTasks(); updateStats(); }
        }

        function startTask(id) {
            const task = myTasks.find(t => t.id === id);
            if (task) { task.status = 'In Progress'; filterTasks(); updateStats(); showToast('Task started!', 'info'); }
        }

        function completeTask(id) {
            const task = myTasks.find(t => t.id === id);
            if (task) { task.status = 'Completed'; filterTasks(); updateStats(); showToast('Task completed!', 'success'); }
        }

        function viewTask(id) {
            currentTaskId = id;
            const t = myTasks.find(t => t.id === id);
            document.getElementById('taskDetailBody').innerHTML = `<div style="display: grid; gap: 1.5rem;"><div style="display: flex; align-items: start; gap: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border);"><div style="flex: 1;"><h3 style="font-weight: 600; font-size: 1.125rem;">${t.title}</h3><p class="text-muted">${t.id}</p></div><div class="flex gap-2">${createBadge(t.priority)}${createBadge(t.status)}</div></div><div><label class="text-muted text-sm" style="display: block; margin-bottom: 0.5rem;">Description</label><p style="line-height: 1.6;">${t.description}</p></div><div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;"><div><label class="text-muted text-sm" style="display: block; margin-bottom: 0.25rem;">Due Date</label><p style="font-weight: 500;">${formatDate(t.dueDate)}</p></div><div><label class="text-muted text-sm" style="display: block; margin-bottom: 0.25rem;">Priority</label><p style="font-weight: 500; color: ${getPriorityColor(t.priority)};">${t.priority}</p></div></div></div>`;
            document.getElementById('taskActionBtn').style.display = t.status === 'Completed' ? 'none' : 'block';
            document.getElementById('taskActionBtn').textContent = t.status === 'Pending' ? 'Start Task' : 'Mark Complete';
            showModal('taskDetailModal');
        }

        function updateTaskStatus() {
            const task = myTasks.find(t => t.id === currentTaskId);
            if (task.status === 'Pending') { task.status = 'In Progress'; showToast('Task started!', 'info'); }
            else if (task.status === 'In Progress') { task.status = 'Completed'; showToast('Task completed!', 'success'); }
            hideModal('taskDetailModal');
            filterTasks();
            updateStats();
        }

        updateStats();
        renderTasks(myTasks);
    </script>
</body>

</html>
