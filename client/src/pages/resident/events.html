<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - Urban Hive</title>
    <link rel="stylesheet" href="../../styles/main.css">
    <link rel="icon" href="../../assets/images/UrbanHive-Logo.png">
    <style>
        .event-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.25rem;
        }

        .event-card {
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }

        .event-card:hover {
            transform: translateY(-4px);
        }

        .event-card-banner {
            height: 90px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .event-card-banner.meeting {
            background: linear-gradient(135deg, #1e40af, #3b82f6);
        }

        .event-card-banner.festival {
            background: linear-gradient(135deg, #b45309, #f59e0b);
        }

        .event-card-banner.safety {
            background: linear-gradient(135deg, #991b1b, #ef4444);
        }

        .event-card-banner.maintenance {
            background: linear-gradient(135deg, #065f46, #10b981);
        }

        .event-card-banner.community {
            background: linear-gradient(135deg, #5b21b6, #8b5cf6);
        }

        .event-card-banner .event-date-pill {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            padding: 0.375rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            color: white;
        }

        .event-card-banner .event-emoji {
            font-size: 2.5rem;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.3));
        }

        .event-card-body {
            padding: 1.25rem;
        }

        .event-card-title {
            font-weight: 700;
            font-size: 1.0625rem;
            margin-bottom: 0.375rem;
            color: var(--text-primary);
        }

        .event-card-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.8125rem;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }

        .event-card-meta span {
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        .event-card-desc {
            font-size: 0.875rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .event-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 0.75rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .rsvp-group {
            display: flex;
            gap: 0.5rem;
        }

        .rsvp-btn {
            padding: 0.375rem 0.75rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .rsvp-btn:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .rsvp-btn.active-yes {
            background: rgba(16, 185, 129, 0.2);
            border-color: rgba(16, 185, 129, 0.4);
            color: #10b981;
        }

        .rsvp-btn.active-maybe {
            background: rgba(245, 158, 11, 0.2);
            border-color: rgba(245, 158, 11, 0.4);
            color: #f59e0b;
        }

        .rsvp-btn.active-no {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.4);
            color: #ef4444;
        }

        .attendee-count {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        .type-badge {
            font-size: 0.6875rem;
            padding: 0.25rem 0.625rem;
            border-radius: 20px;
            font-weight: 600;
        }

        .type-badge.meeting {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
        }

        .type-badge.festival {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
        }

        .type-badge.safety {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .type-badge.maintenance {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
        }

        .type-badge.community {
            background: rgba(139, 92, 246, 0.15);
            color: #8b5cf6;
        }
    </style>
<script type="module" src="../../scripts/core/auth-guard.js"></script>
</head>

<body>
    <div class="dashboard">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <img src="../../assets/images/UrbanHive-Logo.png" alt="Urban Hive" class="sidebar-logo-icon"
                        style="width: 50px; height: 50px; object-fit: contain;">
                    <span class="sidebar-logo-text">Urban Hive</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <p class="nav-section-title">Main Menu</p>
                    <a href="dashboard.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7" rx="1"></rect>
                            <rect x="14" y="3" width="7" height="7" rx="1"></rect>
                            <rect x="14" y="14" width="7" height="7" rx="1"></rect>
                            <rect x="3" y="14" width="7" height="7" rx="1"></rect>
                        </svg><span>Dashboard</span></a>
                    <a href="notices.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                        </svg><span>Notices</span></a>
                    <a href="complaints.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                        </svg><span>Complaints</span></a>
                    <a href="payments.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
                            <line x1="1" y1="10" x2="23" y2="10"></line>
                        </svg><span>Payments</span></a>
                    <a href="visitors.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                        </svg><span>Visitors</span></a>
                </div>
                <div class="nav-section">
                    <p class="nav-section-title">Community</p>
                    <a href="events.html" class="nav-link active"><svg width="20" height="20" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg><span>Events</span></a>
                    <a href="amenities.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg><span>Amenities</span></a>
                </div>
                <div class="nav-section">
                    <p class="nav-section-title">Account</p>
                    <a href="profile.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg><span>My Profile</span></a>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar">R</div>
                    <div class="user-info">
                        <div class="user-name" id="userName">Resident</div>
                        <div class="user-role">Resident</div>
                    </div>
                    <button class="logout-btn" title="Logout" onclick="logout()"><svg width="20" height="20"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg></button>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="topbar">
                <button class="menu-toggle" onclick="toggleSidebar()"><svg width="24" height="24" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg></button>
                <div class="topbar-actions"><button class="topbar-btn"><svg width="20" height="20" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                        </svg></button></div>
            </div>

            <div class="content-area">
                <div class="page-header">
                    <h1 class="page-title">🎪 Community Events</h1>
                    <p class="page-subtitle">Stay updated with society events and celebrations</p>
                </div>

                <!-- Stats -->
                <div class="stats-grid">
                    <div class="stat-card card-3d">
                        <div class="stat-card-header"><span class="stat-card-title">Total Events</span>
                            <div class="stat-card-icon primary"><svg width="22" height="22" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                    <line x1="16" y1="2" x2="16" y2="6"></line>
                                    <line x1="8" y1="2" x2="8" y2="6"></line>
                                    <line x1="3" y1="10" x2="21" y2="10"></line>
                                </svg></div>
                        </div>
                        <div class="stat-card-value" id="totalEvents">0</div>
                    </div>
                    <div class="stat-card card-3d">
                        <div class="stat-card-header"><span class="stat-card-title">Upcoming</span>
                            <div class="stat-card-icon success"><svg width="22" height="22" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                                </svg></div>
                        </div>
                        <div class="stat-card-value" id="upcomingEvents">0</div>
                    </div>
                    <div class="stat-card card-3d">
                        <div class="stat-card-header"><span class="stat-card-title">This Month</span>
                            <div class="stat-card-icon warning"><svg width="22" height="22" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <polyline points="12 6 12 12 16 14"></polyline>
                                </svg></div>
                        </div>
                        <div class="stat-card-value" id="thisMonthEvents">0</div>
                    </div>
                    <div class="stat-card card-3d">
                        <div class="stat-card-header"><span class="stat-card-title">My RSVPs</span>
                            <div class="stat-card-icon info"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2">
                                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                                </svg></div>
                        </div>
                        <div class="stat-card-value" id="myRsvps">0</div>
                    </div>
                </div>

                <!-- Filters -->
                <div class="card" style="margin-bottom: 1.5rem;">
                    <div class="card-body" style="padding: 1rem;">
                        <div class="flex items-center gap-4 flex-wrap">
                            <div class="form-group" style="margin: 0; flex: 1; min-width: 150px;">
                                <select id="typeFilter" onchange="filterEvents()">
                                    <option value="">All Types</option>
                                    <option value="Meeting">📋 Meeting</option>
                                    <option value="Festival">🎊 Festival</option>
                                    <option value="Safety">🛡️ Safety</option>
                                    <option value="Maintenance">🔧 Maintenance</option>
                                    <option value="Community">🎉 Community</option>
                                </select>
                            </div>
                            <div class="form-group" style="margin: 0; flex: 2; min-width: 200px;">
                                <input type="text" id="searchInput" placeholder="🔍 Search events..."
                                    onkeyup="filterEvents()">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Events Grid -->
                <div class="event-grid" id="eventGrid"></div>
            </div>
        </main>
    </div>

    <div id="toastContainer"></div>

    <script src="../../scripts/core/data.js"></script>
    <script src="../../scripts/core/dashboard.js"></script>
    <script>
        const user = requireAuth();
        if (!user || user.role !== 'resident') window.location.href = '../login.html';
        if (user) document.getElementById('userName').textContent = user.name;

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

        const rsvpState = {};
        const typeEmojis = { 'Meeting': '📋', 'Festival': '🎊', 'Safety': '🛡️', 'Maintenance': '🔧', 'Community': '🎉' };
        const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

        function updateStats() {
            const now = new Date();
            const events = data.events || [];
            const upcoming = events.filter(e => new Date(e.date) >= now);
            const thisMonth = events.filter(e => { const d = new Date(e.date); return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear(); });
            document.getElementById('totalEvents').textContent = events.length;
            document.getElementById('upcomingEvents').textContent = upcoming.length;
            document.getElementById('thisMonthEvents').textContent = thisMonth.length;
            document.getElementById('myRsvps').textContent = Object.values(rsvpState).filter(v => v === 'yes').length;
        }

        function renderEvents(events) {
            const container = document.getElementById('eventGrid');
            if (events.length === 0) {
                container.innerHTML = `<div class="card" style="grid-column: 1/-1;"><div class="card-body empty-state"><div class="empty-state-icon">📅</div><h3 class="empty-state-title">No events found</h3><p class="empty-state-text">No events match your criteria.</p></div></div>`;
                return;
            }

            container.innerHTML = events.map((e, i) => {
                const d = new Date(e.date);
                const isPast = d < new Date();
                const typeLower = e.type.toLowerCase();
                const rsvp = rsvpState[e.id] || '';
                const attendees = Math.floor(Math.random() * 40) + 10;

                return `
                    <div class="card event-card animate-slide-in-up stagger-${(i % 5) + 1}" style="${isPast ? 'opacity: 0.6;' : ''}">
                        <div class="event-card-banner ${typeLower}">
                            <span class="event-emoji">${typeEmojis[e.type] || '📅'}</span>
                            <span class="event-date-pill">${d.getDate()} ${monthNames[d.getMonth()]} ${d.getFullYear()}</span>
                        </div>
                        <div class="event-card-body">
                            <div class="flex items-center justify-between mb-2">
                                <span class="event-card-title">${e.title}</span>
                                <span class="type-badge ${typeLower}">${e.type}</span>
                            </div>
                            <div class="event-card-meta">
                                <span>🕐 ${e.time}</span>
                                <span>📍 ${e.location}</span>
                            </div>
                            <p class="event-card-desc">${e.description}</p>
                            <div class="event-card-footer">
                                <div class="attendee-count">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg>
                                    ${attendees} attending
                                </div>
                                ${isPast ? '<span class="text-sm text-muted">Event ended</span>' : `
                                <div class="rsvp-group">
                                    <button class="rsvp-btn ${rsvp === 'yes' ? 'active-yes' : ''}" onclick="setRsvp('${e.id}','yes')">✓ Going</button>
                                    <button class="rsvp-btn ${rsvp === 'maybe' ? 'active-maybe' : ''}" onclick="setRsvp('${e.id}','maybe')">? Maybe</button>
                                </div>`}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function setRsvp(eventId, response) {
            if (rsvpState[eventId] === response) {
                delete rsvpState[eventId];
                showToast('RSVP removed', 'info');
            } else {
                rsvpState[eventId] = response;
                showToast(response === 'yes' ? 'You\'re attending! 🎉' : 'Marked as maybe', 'success');
            }
            updateStats();
            filterEvents();
        }

        function filterEvents() {
            const type = document.getElementById('typeFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            let filtered = data.events || [];
            if (type) filtered = filtered.filter(e => e.type === type);
            if (search) filtered = filtered.filter(e => e.title.toLowerCase().includes(search) || e.description.toLowerCase().includes(search));
            renderEvents(filtered);
        }

        updateStats();
        renderEvents(data.events || []);
    </script>
</body>

</html>
