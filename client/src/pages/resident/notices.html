<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notices - Urban Hive</title>
    <link rel="stylesheet" href="../../styles/main.css">
    <link rel="icon" href="../../assets/images/UrbanHive-Logo.png">
<script type="module" src="../../scripts/core/auth-guard.js"></script>
</head>

<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <img src="../../assets/images/UrbanHive-Logo.png" alt="Urban Hive" class="sidebar-logo-icon"
                        style="width: 50px; height: 50px; object-fit: contain;">
                    <span class="sidebar-logo-text">Urban Hive</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <p class="nav-section-title">Main Menu</p>
                    <a href="dashboard.html" class="nav-link">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="3" y="3" width="7" height="7" rx="1"></rect>
                            <rect x="14" y="3" width="7" height="7" rx="1"></rect>
                            <rect x="14" y="14" width="7" height="7" rx="1"></rect>
                            <rect x="3" y="14" width="7" height="7" rx="1"></rect>
                        </svg>
                        <span>Dashboard</span>
                    </a>
                    <a href="notices.html" class="nav-link active">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                        </svg>
                        <span>Notices</span>
                    </a>
                    <a href="complaints.html" class="nav-link">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                        </svg>
                        <span>Complaints</span>
                    </a>
                    <a href="payments.html" class="nav-link">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
                            <line x1="1" y1="10" x2="23" y2="10"></line>
                        </svg>
                        <span>Payments</span>
                    </a>
                    <a href="visitors.html" class="nav-link">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                        </svg>
                        <span>Visitors</span>
                    </a>
                </div>
                <div class="nav-section">
                    <p class="nav-section-title">Community</p>
                    <a href="events.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg><span>Events</span></a>
                    <a href="amenities.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                            <polyline points="9 22 9 12 15 12 15 22"></polyline>
                        </svg><span>Amenities</span></a>
                </div>
                <div class="nav-section">
                    <p class="nav-section-title">Account</p>
                    <a href="profile.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg><span>My Profile</span></a>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar">R</div>
                    <div class="user-info">
                        <div class="user-name">Resident</div>
                        <div class="user-role">Resident</div>
                    </div>
                    <button class="logout-btn" title="Logout" onclick="logout()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                    </button>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="topbar">
                <button class="menu-toggle" onclick="toggleSidebar()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <div class="topbar-actions">
                    <button class="topbar-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                        </svg></button>
                </div>
            </div>

            <div class="content-area">
                <div class="page-header">
                    <h1 class="page-title">?? Society Notices</h1>
                    <p class="page-subtitle">Stay updated with the latest announcements</p>
                </div>

                <!-- Stats Grid -->
                <div class="stats-grid">
                    <div class="stat-card card-3d">
                        <div class="stat-card-header">
                            <span class="stat-card-title">Total Notices</span>
                            <div class="stat-card-icon primary">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                                </svg>
                            </div>
                        </div>
                        <div class="stat-card-value" id="totalNotices">0</div>
                    </div>
                    <div class="stat-card card-3d">
                        <div class="stat-card-header">
                            <span class="stat-card-title">Urgent</span>
                            <div class="stat-card-icon destructive">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <path
                                        d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z">
                                    </path>
                                    <line x1="12" y1="9" x2="12" y2="13"></line>
                                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                                </svg>
                            </div>
                        </div>
                        <div class="stat-card-value" id="urgentNotices">0</div>
                    </div>
                    <div class="stat-card card-3d">
                        <div class="stat-card-header">
                            <span class="stat-card-title">Important</span>
                            <div class="stat-card-icon warning">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <line x1="12" y1="8" x2="12" y2="12"></line>
                                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                                </svg>
                            </div>
                        </div>
                        <div class="stat-card-value" id="importantNotices">0</div>
                    </div>
                    <div class="stat-card card-3d">
                        <div class="stat-card-header">
                            <span class="stat-card-title">This Week</span>
                            <div class="stat-card-icon success">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                    <line x1="16" y1="2" x2="16" y2="6"></line>
                                    <line x1="8" y1="2" x2="8" y2="6"></line>
                                    <line x1="3" y1="10" x2="21" y2="10"></line>
                                </svg>
                            </div>
                        </div>
                        <div class="stat-card-value" id="weekNotices">0</div>
                    </div>
                </div>

                <!-- Filters -->
                <div class="card" style="margin-bottom: 1.5rem;">
                    <div class="card-body" style="padding: 1rem;">
                        <div class="flex items-center gap-4 flex-wrap">
                            <div class="form-group" style="margin: 0; flex: 1; min-width: 150px;">
                                <select id="priorityFilter" onchange="filterNotices()">
                                    <option value="">All Priorities</option>
                                    <option value="urgent">?? Urgent</option>
                                    <option value="important">?? Important</option>
                                    <option value="normal">?? Normal</option>
                                </select>
                            </div>
                            <div class="form-group" style="margin: 0; flex: 2; min-width: 200px;">
                                <input type="text" id="searchInput" placeholder="?? Search notices..."
                                    onkeyup="filterNotices()">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Notices Timeline -->
                <div id="noticesList" style="display: flex; flex-direction: column; gap: 1rem;"></div>
            </div>
        </main>
    </div>

    <!-- View Notice Modal -->
    <div id="viewNoticeModal" class="modal-overlay" style="display: none;">
        <div class="modal lg">
            <div class="modal-header">
                <h3 class="modal-title">Notice Details</h3>
                <button class="modal-close" onclick="hideModal('viewNoticeModal')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="viewNoticeBody"></div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="hideModal('viewNoticeModal')">Close</button>
            </div>
        </div>
    </div>

    <script src="../../scripts/core/data.js"></script>
    <script src="../../scripts/core/dashboard.js"></script>
    <script>
        const user = requireAuth();
        if (!user || user.role !== 'resident') window.location.href = '../login.html';

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

        function updateStats() {
            const now = new Date();
            const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
            document.getElementById('totalNotices').textContent = data.notices.length;
            document.getElementById('urgentNotices').textContent = data.notices.filter(n => n.priority === 'urgent').length;
            document.getElementById('importantNotices').textContent = data.notices.filter(n => n.priority === 'important').length;
            document.getElementById('weekNotices').textContent = data.notices.filter(n => new Date(n.createdAt) >= weekAgo).length;
        }

        function getPriorityStyles(priority) {
            const styles = {
                'urgent': { border: 'rgba(239, 68, 68, 0.5)', bg: 'rgba(239, 68, 68, 0.1)', icon: '??' },
                'important': { border: 'rgba(245, 158, 11, 0.5)', bg: 'rgba(245, 158, 11, 0.1)', icon: '??' },
                'normal': { border: 'rgba(59, 130, 246, 0.3)', bg: 'rgba(59, 130, 246, 0.1)', icon: '??' }
            };
            return styles[priority] || styles.normal;
        }

        function renderNotices(notices) {
            const container = document.getElementById('noticesList');

            if (notices.length === 0) {
                container.innerHTML = `
                    <div class="card">
                        <div class="card-body empty-state">
                            <div class="empty-state-icon">??</div>
                            <h3 class="empty-state-title">No notices found</h3>
                            <p class="empty-state-text">There are no notices matching your criteria.</p>
                        </div>
                    </div>
                `;
                return;
            }

            container.innerHTML = notices.map((n, i) => {
                const style = getPriorityStyles(n.priority);
                return `
                    <div class="card hover-lift animate-slide-in-up stagger-${(i % 5) + 1}" 
                         style="border-left: 4px solid ${style.border}; cursor: pointer;"
                         onclick="viewNotice('${n.id}')">
                        <div class="card-body">
                            <div class="flex items-start justify-between gap-4 mb-3">
                                <div class="flex items-start gap-3">
                                    <div style="width: 48px; height: 48px; border-radius: 12px; background: ${style.bg}; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
                                        ${style.icon}
                                    </div>
                                    <div>
                                        <h3 style="font-weight: 600; font-size: 1rem; margin-bottom: 0.375rem;">${n.title}</h3>
                                        <p class="text-sm text-muted">${formatDate(n.createdAt)} • By ${n.createdBy}</p>
                                    </div>
                                </div>
                                ${createBadge(n.priority)}
                            </div>
                            <p style="color: var(--text-secondary); line-height: 1.6; margin-bottom: 1rem;">${n.content.substring(0, 150)}${n.content.length > 150 ? '...' : ''}</p>
                            <div class="flex justify-end">
                                <span class="text-sm" style="color: var(--accent-primary);">Read more ?</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterNotices() {
            const priority = document.getElementById('priorityFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            let filtered = data.notices;
            if (priority) filtered = filtered.filter(n => n.priority === priority);
            if (search) filtered = filtered.filter(n => n.title.toLowerCase().includes(search) || n.content.toLowerCase().includes(search));
            renderNotices(filtered);
        }

        function viewNotice(id) {
            const n = data.notices.find(n => n.id === id);
            const style = getPriorityStyles(n.priority);

            document.getElementById('viewNoticeBody').innerHTML = `
                <div style="display: grid; gap: 1.5rem;">
                    <div style="display: flex; align-items: start; gap: 1rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.06);">
                        <div style="width: 56px; height: 56px; border-radius: 14px; background: ${style.bg}; display: flex; align-items: center; justify-content: center; font-size: 1.75rem;">
                            ${style.icon}
                        </div>
                        <div style="flex: 1;">
                            <h3 style="font-weight: 700; font-size: 1.25rem; margin-bottom: 0.375rem;">${n.title}</h3>
                            <p class="text-muted">${formatDate(n.createdAt)}</p>
                        </div>
                        ${createBadge(n.priority)}
                    </div>
                    <div>
                        <p style="line-height: 1.8; color: var(--text-primary);">${n.content}</p>
                    </div>
                    <div style="padding: 1rem; background: rgba(0,0,0,0.2); border-radius: var(--radius-md);">
                        <div class="flex items-center gap-2 text-sm">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                            <span>Posted by <strong>${n.createdBy}</strong></span>
                        </div>
                    </div>
                </div>
            `;
            showModal('viewNoticeModal');
        }

        updateStats();
        renderNotices(data.notices);
    </script>
</body>

</html>
