<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Urban Hive</title>
    <link rel="stylesheet" href="../../styles/main.css">
    <link rel="icon" href="../../assets/images/UrbanHive-Logo.png">
    <style>
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: 1.5rem;
        }

        .settings-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .settings-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .settings-card-header h3 {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
        }

        .settings-card-header h3 svg {
            color: var(--accent-primary);
        }

        .settings-card-body {
            padding: 1.5rem;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-row .label {
            font-size: 0.8125rem;
            color: var(--text-secondary);
        }

        .info-row .value {
            font-weight: 500;
            font-size: 0.875rem;
        }

        .building-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 1rem 1.25rem;
            margin-bottom: 0.75rem;
        }

        .building-card:last-child {
            margin-bottom: 0;
        }

        .building-card .building-name {
            font-weight: 600;
            font-size: 0.9375rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .building-card .building-details {
            display: flex;
            gap: 1.5rem;
            font-size: 0.8125rem;
            color: var(--text-secondary);
        }

        .amenity-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.625rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .amenity-item:last-child {
            border-bottom: none;
        }

        .amenity-name {
            font-size: 0.875rem;
        }

        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
            cursor: pointer;
        }

        .toggle-switch input {
            display: none;
        }

        .toggle-slider {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            transition: background 0.3s;
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: white;
            top: 3px;
            left: 3px;
            transition: transform 0.3s;
        }

        .toggle-switch input:checked+.toggle-slider {
            background: var(--accent-primary);
        }

        .toggle-switch input:checked+.toggle-slider::before {
            transform: translateX(20px);
        }

        .emergency-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .emergency-item:last-child {
            border-bottom: none;
        }

        .emergency-item .contact-label {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.875rem;
        }

        .emergency-item .contact-label svg {
            width: 16px;
            height: 16px;
            color: #ef4444;
        }

        .emergency-item .contact-number {
            font-family: var(--font-display);
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--accent-primary);
        }

        @media (max-width: 640px) {
            .settings-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
<script type="module" src="../../scripts/core/auth-guard.js"></script>
</head>

    <script>
        const user = requireAuth();
        if (!user || user.role !== 'manager') window.location.href = 'login.html';

        const settings = data.societySettings;

        // Society Info
        document.getElementById('societyInfo').innerHTML = `
            <div class="info-row"><span class="label">Society Name</span><span class="value">${settings.name}</span></div>
            <div class="info-row"><span class="label">Address</span><span class="value" style="max-width: 220px; text-align: right;">${settings.address}</span></div>
            <div class="info-row"><span class="label">Registration No.</span><span class="value" style="font-family: monospace;">${settings.registrationNo}</span></div>
            <div class="info-row"><span class="label">Total Units</span><span class="value">${settings.totalUnits}</span></div>
            <div class="info-row"><span class="label">Established</span><span class="value">${settings.establishedYear}</span></div>
        `;

        // Buildings
        document.getElementById('buildingsInfo').innerHTML = settings.buildings.map(b => `
            <div class="building-card">
                <div class="building-name">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect></svg>
                    ${b.name}
                </div>
                <div class="building-details">
                    <span>${b.floors} Floors</span>
                    <span>${b.unitsPerFloor} Units/Floor</span>
                    <span><strong>${b.totalUnits}</strong> Total Units</span>
                </div>
            </div>
        `).join('');

        // Amenities
        document.getElementById('amenitiesInfo').innerHTML = settings.amenities.map((a, i) => `
            <div class="amenity-item">
                <span class="amenity-name">${a.name}</span>
                <label class="toggle-switch">
                    <input type="checkbox" ${a.active ? 'checked' : ''} onchange="toggleAmenity(${i}, this.checked)">
                    <span class="toggle-slider"></span>
                </label>
            </div>
        `).join('');

        // Emergency
        document.getElementById('emergencyInfo').innerHTML = settings.emergencyContacts.map(c => `
            <div class="emergency-item">
                <span class="contact-label">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                    ${c.label}
                </span>
                <span class="contact-number">${c.number}</span>
            </div>
        `).join('');

        // Manager Profile
        document.getElementById('managerAvatar').textContent = user.name.charAt(0).toUpperCase();
        document.getElementById('managerProfileInfo').innerHTML = `
            <h4 style="font-size: 1.125rem; font-weight: 600; margin-bottom: 0.25rem;">${user.name}</h4>
            <p style="font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 0.5rem;">${user.email || 'manager@urbanhive.com'}</p>
            <div style="display: flex; gap: 1.5rem; font-size: 0.8125rem; color: var(--text-muted);">
                <span>Role: Manager</span>
                <span>Society: ${settings.name}</span>
            </div>
        `;

        function toggleAmenity(index, active) {
            settings.amenities[index].active = active;
            showToast(`${settings.amenities[index].name} ${active ? 'enabled' : 'disabled'}`, active ? 'success' : 'info');
        }
    </script>
</body>
