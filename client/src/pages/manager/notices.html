<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notices Management - Urban Hive</title>
    <link rel="stylesheet" href="../../styles/main.css">
    <link rel="icon" href="../../assets/images/UrbanHive-Logo.png">
    <style>
        /* Tab Navigation */
        .tabs-nav {
            display: flex;
            gap: 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 1.5rem;
        }

        .tab-btn {
            padding: 1rem 1.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            position: relative;
            transition: all var(--transition-fast);
        }

        .tab-btn:hover {
            color: var(--text-primary);
        }

        .tab-btn.active {
            color: var(--accent-primary);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent-gradient);
            border-radius: 2px 2px 0 0;
        }

        .tab-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 20px;
            height: 20px;
            padding: 0 6px;
            font-size: 0.7rem;
            font-weight: 600;
            border-radius: 10px;
            margin-left: 0.5rem;
        }

        .tab-badge.all {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .tab-badge.urgent {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .tab-badge.important {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .tab-badge.normal {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        /* View Toggle */
        .view-toggle {
            display: flex;
            gap: 0.5rem;
            padding: 0.25rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-md);
        }

        .view-btn {
            padding: 0.5rem 0.75rem;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            gap: 0.375rem;
            font-size: 0.8125rem;
        }

        .view-btn:hover {
            color: var(--text-primary);
        }

        .view-btn.active {
            background: var(--accent-primary);
            color: white;
        }

        /* Enhanced Notice Cards */
        .notice-card {
            background: rgba(31, 41, 55, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: var(--radius-lg);
            position: relative;
            overflow: hidden;
            transition: all var(--transition-normal);
        }

        .notice-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
        }

        .notice-card.urgent::before {
            background: linear-gradient(180deg, #ef4444 0%, #b91c1c 100%);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.3);
        }

        .notice-card.important::before {
            background: linear-gradient(180deg, #f59e0b 0%, #b45309 100%);
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.3);
        }

        .notice-card.normal::before {
            background: linear-gradient(180deg, #10b981 0%, #059669 100%);
        }

        .notice-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: var(--shadow-lg);
        }

        .notice-card-body {
            padding: 1.25rem 1.25rem 1.25rem 1.5rem;
        }

        .notice-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }

        .notice-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
        }

        .notice-content {
            font-size: 0.875rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .notice-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .notice-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .notice-info-item {
            display: flex;
            align-items: center;
            gap: 0.375rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .notice-info-item svg {
            width: 14px;
            height: 14px;
        }

        .notice-actions {
            display: flex;
            gap: 0.5rem;
        }

        .action-btn {
            padding: 0.375rem 0.75rem;
            font-size: 0.75rem;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            gap: 0.375rem;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .action-btn.edit {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .action-btn.edit:hover {
            background: rgba(59, 130, 246, 0.2);
        }

        .action-btn.delete {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .action-btn.delete:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        /* Timeline View */
        .timeline-view {
            display: none;
        }

        .timeline-view.active {
            display: block;
        }

        .grid-view {
            display: none;
        }

        .grid-view.active {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1rem;
        }

        @media (max-width: 768px) {
            .grid-view.active {
                grid-template-columns: 1fr;
            }
        }

        .timeline-container {
            position: relative;
            padding-left: 2rem;
        }

        .timeline-container::before {
            content: '';
            position: absolute;
            left: 7px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, var(--accent-primary), var(--accent-secondary));
            opacity: 0.3;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -2rem;
            top: 1.5rem;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--bg-secondary);
            border: 3px solid var(--accent-primary);
        }

        .timeline-item.urgent::before {
            border-color: #ef4444;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
        }

        .timeline-item.important::before {
            border-color: #f59e0b;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.4);
        }

        .timeline-date {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        /* Bulk Actions */
        .bulk-actions {
            display: none;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1rem;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
        }

        .bulk-actions.active {
            display: flex;
        }

        .bulk-actions-count {
            font-size: 0.875rem;
            color: var(--accent-primary);
            font-weight: 500;
        }

        /* Search and Filter Bar */
        .filter-bar {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-input-wrapper {
            position: relative;
            flex: 1;
            min-width: 250px;
        }

        .search-input-wrapper svg {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 18px;
            height: 18px;
        }

        .search-input-wrapper input {
            padding-left: 2.75rem;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state h3 {
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }
    </style>
<script type="module" src="../../scripts/core/auth-guard.js"></script>
</head>

                        Create Notice

                <!-- Stats -->

                    <div class="stat-card">
                        <div class="stat-card-header">
                            <span class="stat-card-title">Total Notices</span>

                                            stroke="currentColor" stroke-width="2">

                                        Timeline

                <!-- Bulk Actions -->
                <div class="bulk-actions" id="bulkActions">

                    <button class="btn btn-outline" style="padding: 0.5rem 1rem; font-size: 0.8125rem;"

                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2">
                            </path>
                        </svg>
                        Delete Selected
                    </button>
                    <button class="btn btn-ghost" style="padding: 0.5rem 1rem; font-size: 0.8125rem;"
                        onclick="clearSelection()">
                        Cancel
                    </button>
                </div>

                <!-- Grid View -->
                <div class="grid-view active" id="gridView"></div>

                <!-- Timeline View -->
                <div class="timeline-view" id="timelineView">
                    <div class="timeline-container" id="timelineContainer"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- New Notice Modal -->
    <div id="newNoticeModal" class="modal-overlay" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Create New Notice</h3>
            </div>
            <div class="modal-body">
                <form id="noticeForm">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" name="title" placeholder="Notice title" required>
                    </div>
                    <div class="form-group">
                        <label>Priority</label>
                        <select name="priority" required>
                            <option value="normal">Normal</option>
                            <option value="important">Important</option>
                            <option value="urgent">Urgent</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Content</label>
                        <textarea name="content" rows="4" placeholder="Notice content..." required></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="hideModal('newNoticeModal')">Cancel</button>
                <button class="btn btn-primary" onclick="submitNotice()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                    Publish
                </button>
            </div>
        </div>
    </div>

    <!-- Edit Notice Modal -->
    <div id="editNoticeModal" class="modal-overlay" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Edit Notice</h3>
            </div>
            <div class="modal-body">
                <form id="editNoticeForm">
                    <input type="hidden" name="id" id="editNoticeId">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" name="title" id="editTitle" required>
                    </div>
                    <div class="form-group">
                        <label>Priority</label>
                        <select name="priority" id="editPriority" required>
                            <option value="normal">Normal</option>
                            <option value="important">Important</option>
                            <option value="urgent">Urgent</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Content</label>
                        <textarea name="content" id="editContent" rows="4" required></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="hideModal('editNoticeModal')">Cancel</button>
                <button class="btn btn-primary" onclick="updateNotice()">Update</button>
            </div>
        </div>
    </div>

    <script src="../../scripts/core/data.js"></script>
    <script src="../../scripts/core/dashboard.js"></script>
    <script>
        const user = requireAuth();
        if (!user || user.role !== 'manager') {
            window.location.href = 'login.html';
        }

        let currentFilter = 'all';
        let currentView = 'grid';
        let selectedNotices = new Set();

        function toggleSidebar() {
            document.querySelector('.sidebar')?.classList.toggle('open');
        }

        function updateStats() {
            const total = data.notices.length;
            const urgent = data.notices.filter(n => n.priority === 'urgent').length;
            const important = data.notices.filter(n => n.priority === 'important').length;
            const normal = data.notices.filter(n => n.priority === 'normal').length;

            document.getElementById('totalNotices').textContent = total;
            document.getElementById('urgentNotices').textContent = urgent;
            document.getElementById('importantNotices').textContent = important;
            document.getElementById('normalNotices').textContent = normal;

            document.getElementById('tabAllCount').textContent = total;
            document.getElementById('tabUrgentCount').textContent = urgent;
            document.getElementById('tabImportantCount').textContent = important;
            document.getElementById('tabNormalCount').textContent = normal;
        }

        function setActiveTab(btn) {
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            filterNotices();
        }

        function setView(view, btn) {
            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentView = view;

            if (view === 'grid') {
                document.getElementById('gridView').classList.add('active');
                document.getElementById('timelineView').classList.remove('active');
            } else {
                document.getElementById('gridView').classList.remove('active');
                document.getElementById('timelineView').classList.add('active');
            }
            filterNotices();
        }

        function renderGridView(notices) {
            const grid = document.getElementById('gridView');
            if (notices.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                        <h3>No notices found</h3>
                        <p>Create a new notice to get started</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = notices.map(n => `
                <div class="notice-card ${n.priority}" data-id="${n.id}">
                    <div class="notice-card-body">
                        <div class="notice-header">
                            <h4 class="notice-title">${n.title}</h4>
                            ${createBadge(n.priority)}
                        </div>
                        <p class="notice-content">${n.content}</p>
                        <div class="notice-meta">
                            <div class="notice-info">
                                <div class="notice-info-item">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                        <line x1="16" y1="2" x2="16" y2="6"></line>
                                        <line x1="8" y1="2" x2="8" y2="6"></line>
                                        <line x1="3" y1="10" x2="21" y2="10"></line>
                                    </svg>
                                    ${formatDate(n.createdAt)}
                                </div>
                                <div class="notice-info-item">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                        <circle cx="12" cy="7" r="4"></circle>
                                    </svg>
                                    ${n.createdBy}
                                </div>
                            </div>
                            <div class="notice-actions">
                                <button class="action-btn edit" onclick="editNotice('${n.id}')">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                    </svg>
                                    Edit
                                </button>
                                <button class="action-btn delete" onclick="deleteNotice('${n.id}')">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="3 6 5 6 21 6"></polyline>
                                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                    </svg>
                                    Delete
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderTimelineView(notices) {
            const container = document.getElementById('timelineContainer');
            if (notices.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                        <h3>No notices found</h3>
                        <p>Create a new notice to get started</p>
                    </div>
                `;
                return;
            }

            // Group by date
            const sorted = [...notices].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

            container.innerHTML = sorted.map(n => `
                <div class="timeline-item ${n.priority}">
                    <div class="timeline-date">${formatDate(n.createdAt)}</div>
                    <div class="notice-card ${n.priority}">
                        <div class="notice-card-body">
                            <div class="notice-header">
                                <h4 class="notice-title">${n.title}</h4>
                                ${createBadge(n.priority)}
                            </div>
                            <p class="notice-content">${n.content}</p>
                            <div class="notice-meta">
                                <div class="notice-info">
                                    <div class="notice-info-item">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                            <circle cx="12" cy="7" r="4"></circle>
                                        </svg>
                                        ${n.createdBy}
                                    </div>
                                </div>
                                <div class="notice-actions">
                                    <button class="action-btn edit" onclick="editNotice('${n.id}')">
                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                        </svg>
                                        Edit
                                    </button>
                                    <button class="action-btn delete" onclick="deleteNotice('${n.id}')">
                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <polyline points="3 6 5 6 21 6"></polyline>
                                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                        </svg>
                                        Delete
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterNotices() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            let filtered = data.notices;

            if (currentFilter !== 'all') {
                filtered = filtered.filter(n => n.priority === currentFilter);
            }

            if (search) {
                filtered = filtered.filter(n =>
                    n.title.toLowerCase().includes(search) ||
                    n.content.toLowerCase().includes(search)
                );
            }

            if (currentView === 'grid') {
                renderGridView(filtered);
            } else {
                renderTimelineView(filtered);
            }
        }

        function submitNotice() {
            const form = document.getElementById('noticeForm');
            const formData = new FormData(form);

            const title = formData.get('title');
            const priority = formData.get('priority');
            const content = formData.get('content');

            if (!title || !priority || !content) {
                showToast('Please fill all fields', 'error');
                return;
            }

            const newNotice = {
                id: `N${String(data.notices.length + 1).padStart(3, '0')}`,
                title: title,
                content: content,
                createdAt: new Date().toISOString().split('T')[0],
                priority: priority,
                createdBy: user.name
            };

            data.notices.unshift(newNotice);
            hideModal('newNoticeModal');
            form.reset();
            filterNotices();
            updateStats();
            showToast('Notice published successfully!', 'success');
        }

        function editNotice(id) {
            const notice = data.notices.find(n => n.id === id);
            document.getElementById('editNoticeId').value = notice.id;
            document.getElementById('editTitle').value = notice.title;
            document.getElementById('editPriority').value = notice.priority;
            document.getElementById('editContent').value = notice.content;
            showModal('editNoticeModal');
        }

        function updateNotice() {
            const id = document.getElementById('editNoticeId').value;
            const notice = data.notices.find(n => n.id === id);

            notice.title = document.getElementById('editTitle').value;
            notice.priority = document.getElementById('editPriority').value;
            notice.content = document.getElementById('editContent').value;

            hideModal('editNoticeModal');
            filterNotices();
            updateStats();
            showToast('Notice updated successfully!', 'success');
        }

        function deleteNotice(id) {
            if (confirm('Are you sure you want to delete this notice?')) {
                const index = data.notices.findIndex(n => n.id === id);
                data.notices.splice(index, 1);
                filterNotices();
                updateStats();
                showToast('Notice deleted successfully!', 'success');
            }
        }

        function clearSelection() {
            selectedNotices.clear();
            document.getElementById('bulkActions').classList.remove('active');
            document.getElementById('selectedCount').textContent = '0';
        }

        function bulkDelete() {
            if (selectedNotices.size === 0) return;
            if (confirm(`Are you sure you want to delete ${selectedNotices.size} notices?`)) {
                selectedNotices.forEach(id => {
                    const index = data.notices.findIndex(n => n.id === id);
                    if (index > -1) data.notices.splice(index, 1);
                });
                clearSelection();
                filterNotices();
                updateStats();
                showToast('Notices deleted successfully!', 'success');
            }
        }

        // Initialize
        updateStats();
        filterNotices();
    </script>
</body>

</html>
